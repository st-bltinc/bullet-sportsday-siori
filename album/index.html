<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>アルバム</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #080810;
      color: #f0f0f8;
      min-height: 100vh;
    }

    .header {
      background: #0d0d1c;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      color: #fff;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 0.6rem;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
    }

    .page-header-accent {
      width: 4px;
      height: 22px;
      background: #E84040;
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(232, 64, 64, 0.6);
      flex-shrink: 0;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .upload-btn {
      display: none;
      align-items: center;
      gap: 6px;
      background: rgba(232, 64, 64, 0.15);
      color: #E84040;
      border: 1px solid rgba(232, 64, 64, 0.4);
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .upload-btn:hover {
      background: rgba(232, 64, 64, 0.25);
    }

    .logout-link {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      text-decoration: none;
    }

    .logout-link:hover {
      color: #fff;
    }

    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 200px;
      color: #666;
      font-size: 16px;
    }

    .empty {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-icon {
      font-size: 52px;
      margin-bottom: 16px;
    }

    .empty-text {
      font-size: 18px;
      font-weight: 600;
      color: #666;
      margin-bottom: 8px;
    }

    .empty-sub {
      font-size: 14px;
      color: #555;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .photo-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }

    .photo-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .photo-thumb {
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      cursor: pointer;
      background: #0d0d1c;
      position: relative;
    }

    .photo-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }

    .photo-thumb:hover img {
      transform: scale(1.05);
    }

    .photo-body {
      padding: 10px 12px 12px;
    }

    .photo-caption {
      font-size: 13px;
      color: #ccc;
      margin-bottom: 8px;
      line-height: 1.4;
      word-break: break-word;
    }

    .photo-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .photo-meta {
      font-size: 12px;
      color: #666;
    }

    .photo-uploader {
      font-weight: 600;
      color: #888;
      margin-right: 6px;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #E84040;
      font-size: 15px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background: rgba(232, 64, 64, 0.1);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 500;
      justify-content: center;
      align-items: flex-end;
    }

    .modal-overlay.active {
      display: flex;
    }

    @media (min-width: 520px) {
      .modal-overlay {
        align-items: center;
      }
    }

    .upload-modal {
      background: #13131f;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 28px 24px 32px;
      max-height: 92vh;
      overflow-y: auto;
      position: relative;
    }

    @media (min-width: 520px) {
      .upload-modal {
        border-radius: 16px;
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .modal-close {
      background: rgba(255, 255, 255, 0.08);
      border: none;
      font-size: 16px;
      cursor: pointer;
      color: #aaa;
      line-height: 1;
      padding: 6px 8px;
      border-radius: 6px;
    }

    .modal-close:hover {
      color: #fff;
    }

    .drop-zone {
      border: 2px dashed rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 16px;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: #E84040;
      background: rgba(232, 64, 64, 0.05);
    }

    .drop-zone-icon {
      font-size: 30px;
      margin-bottom: 8px;
    }

    .drop-zone-text {
      font-size: 14px;
      color: #aaa;
    }

    .drop-zone-sub {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .preview-img {
      width: 100%;
      border-radius: 8px;
      max-height: 200px;
      object-fit: contain;
      margin-bottom: 16px;
      display: none;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #888;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .form-input:focus {
      border-color: #E84040;
    }

    .progress {
      display: none;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .progress.active {
      display: block;
    }

    .progress-bar {
      height: 100%;
      background: #E84040;
      border-radius: 2px;
      transition: width 0.2s;
    }

    .btn-primary {
      background: #E84040;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px 24px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
      font-family: inherit;
    }

    .btn-primary:hover:not(:disabled) {
      background: #c83030;
    }

    .btn-primary:disabled {
      background: rgba(255, 255, 255, 0.1);
      color: #666;
      cursor: not-allowed;
    }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.96);
      z-index: 1000;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-img {
      max-width: 92vw;
      max-height: 75vh;
      object-fit: contain;
      border-radius: 4px;
    }

    .lightbox-info {
      text-align: center;
      margin-top: 16px;
      padding: 0 60px;
    }

    .lightbox-caption {
      font-size: 15px;
      color: #fff;
      margin-bottom: 4px;
      min-height: 22px;
    }

    .lightbox-meta {
      font-size: 13px;
      color: #aaa;
    }

    .lightbox-close {
      position: fixed;
      top: 18px;
      right: 20px;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      padding: 4px 8px;
    }

    .lightbox-counter {
      position: fixed;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      color: #aaa;
      font-size: 13px;
      pointer-events: none;
    }

    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      padding: 14px 18px;
      border-radius: 8px;
      transition: background 0.2s;
      line-height: 1;
    }

    .lightbox-nav:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .lightbox-prev {
      left: 12px;
    }

    .lightbox-next {
      right: 12px;
    }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 22px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 2000;
      display: none;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }

    .toast.show {
      display: block;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
    }

    .toast.success {
      background: #28a745;
      color: #fff;
    }

    .toast.error {
      background: #dc3545;
      color: #fff;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translate(-50%, 12px);
      }

      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    @keyframes toastOut {
      to {
        opacity: 0;
      }
    }

    @media (max-width: 480px) {
      .header {
        padding: 12px 16px;
      }

      .header h1 {
        font-size: 16px;
      }

      .main {
        padding: 16px 12px;
      }

      .photo-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
    }
  </style>
</head>

<body>

  <header class="header">
    <div class="page-header-accent"></div>
    <h1>アルバム</h1>
    <div class="header-actions">
      <button class="upload-btn" id="uploadBtn" onclick="openUpload()">＋ 写真を追加</button>
      <a class="logout-link" href="../login/logout.php">ログアウト</a>
    </div>
  </header>

  <main class="main">
    <div id="content">
      <div class="loading">読み込み中...</div>
    </div>
  </main>

  <div class="modal-overlay" id="uploadOverlay" onclick="overlayClick(event)">
    <div class="upload-modal" id="uploadModal">
      <div class="modal-header">
        <h2 class="modal-title" style="display:flex;align-items:center;gap:0.4rem;"><svg
            xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" />
            <circle cx="12" cy="13" r="3" />
          </svg> 写真を追加</h2>
        <button class="modal-close" onclick="closeUpload()"><svg xmlns="http://www.w3.org/2000/svg" width="16"
            height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg></button>
      </div>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="drop-zone-icon"><svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24"
            fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 5h6" />
            <path d="M19 2v6" />
            <path d="M21 11.5V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7.5" />
            <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
            <circle cx="9" cy="9" r="2" />
          </svg></div>
        <div class="drop-zone-text" id="dropText">クリックまたはドラッグ＆ドロップ</div>
        <div class="drop-zone-sub">JPG / PNG / GIF / WebP（最大10MB）</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="onFileChange(this)">
      <img id="preview" class="preview-img" alt="プレビュー">
      <div class="progress" id="progress">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="captionInput">キャプション（任意）</label>
        <input type="text" class="form-input" id="captionInput" placeholder="写真の説明を入力..." maxlength="500">
      </div>
      <button class="btn-primary" id="submitBtn" onclick="submitUpload()" disabled>写真をアップロード</button>
    </div>
  </div>

  <div class="lightbox" id="lightbox" onclick="lbBgClick(event)">
    <button class="lightbox-close" onclick="closeLightbox()"><svg xmlns="http://www.w3.org/2000/svg" width="28"
        height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg></button>
    <span class="lightbox-counter" id="lbCounter"></span>
    <button class="lightbox-nav lightbox-prev" onclick="lbNav(event,-1)"><svg xmlns="http://www.w3.org/2000/svg"
        width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6" />
      </svg></button>
    <img class="lightbox-img" id="lbImg" src="" alt="">
    <button class="lightbox-nav lightbox-next" onclick="lbNav(event, 1)"><svg xmlns="http://www.w3.org/2000/svg"
        width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6" />
      </svg></button>
    <div class="lightbox-info">
      <p class="lightbox-caption" id="lbCaption"></p>
      <p class="lightbox-meta" id="lbMeta"></p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = './api.php';
    let user = null, photos = [], selFile = null, lbIndex = 0;

    (async () => {
      try {
        const r = await fetch('../login/me.php', { credentials: 'include' });
        if (r.status === 401) { location.href = '../login/'; return; }
        user = await r.json();
        if (user.error) { location.href = '../login/'; return; }
        document.getElementById('uploadBtn').style.display = 'flex';
        await loadPhotos();
      } catch {
        document.getElementById('content').innerHTML = '<div class="loading">通信エラーが発生しました</div>';
      }
    })();

    async function loadPhotos() {
      try {
        const r = await fetch(API, { credentials: 'include' });
        photos = await r.json();
        if (!Array.isArray(photos)) photos = [];
        renderGallery();
      } catch { showToast('写真の読み込みに失敗しました', 'error'); }
    }

    function renderGallery() {
      const el = document.getElementById('content');
      if (photos.length === 0) {
        el.innerHTML = `<div class="empty"><div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg></div><div class="empty-text">まだ写真がありません</div><div class="empty-sub">「＋ 写真を追加」ボタンから最初の写真を投稿しましょう！</div></div>`;
        return;
      }
      el.innerHTML = '<div class="photo-grid">' + photos.map(photoCard).join('') + '</div>';
    }

    function imgSrc(p) {
      return p.item_id && p.drive_id
        ? `image.php?id=${encodeURIComponent(p.item_id)}&drv=${encodeURIComponent(p.drive_id)}`
        : `uploads/${esc(p.filename)}`;
    }

    function photoCard(p, i) {
      const canDelete = user?.role === 'admin' || user?.display_name === p.uploaded_by;
      return `<div class="photo-card"><div class="photo-thumb" onclick="openLightbox(${i})"><img src="${imgSrc(p)}" alt="${esc(p.caption || '')}" loading="lazy"></div><div class="photo-body">${p.caption ? `<p class="photo-caption">${esc(p.caption)}</p>` : ''}<div class="photo-footer"><div class="photo-meta"><span class="photo-uploader">${esc(p.uploaded_by || '匿名')}</span><span>${fmtDate(p.created_at)}</span></div>${canDelete ? `<button class="delete-btn" onclick="delPhoto(event,${p.id})" title="削除"><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"3 6 5 6 21 6\"/><path d=\"M19 6l-1 14H6L5 6\"/><path d=\"M10 11v6\"/><path d=\"M14 11v6\"/><path d=\"M9 6V4h6v2\"/></svg></button>` : ''}</div></div></div>`;
    }

    function openUpload() {
      selFile = null;
      document.getElementById('captionInput').value = '';
      document.getElementById('preview').style.display = 'none';
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('dropText').textContent = 'クリックまたはドラッグ＆ドロップ';
      document.getElementById('progress').classList.remove('active');
      document.getElementById('progressBar').style.width = '0%';
      setupDragDrop();
      document.getElementById('uploadOverlay').classList.add('active');
    }

    function closeUpload() {
      document.getElementById('uploadOverlay').classList.remove('active');
      document.getElementById('fileInput').value = '';
    }

    function overlayClick(e) { if (e.target === document.getElementById('uploadOverlay')) closeUpload(); }

    function setupDragDrop() {
      const zone = document.getElementById('dropZone');
      zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('drag-over'); };
      zone.ondragleave = () => zone.classList.remove('drag-over');
      zone.ondrop = (e) => { e.preventDefault(); zone.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f) applyFile(f); };
    }

    function onFileChange(input) { if (input.files[0]) applyFile(input.files[0]); }

    function applyFile(file) {
      if (!file.type.startsWith('image/')) { showToast('画像ファイルを選択してください', 'error'); return; }
      if (file.size > 10 * 1024 * 1024) { showToast('10MB 以下のファイルを選択してください', 'error'); return; }
      selFile = file;
      document.getElementById('dropText').textContent = file.name;
      document.getElementById('submitBtn').disabled = false;
      const reader = new FileReader();
      reader.onload = (e) => { const img = document.getElementById('preview'); img.src = e.target.result; img.style.display = 'block'; };
      reader.readAsDataURL(file);
    }

    async function submitUpload() {
      if (!selFile) return;
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'アップロード中...';
      document.getElementById('progress').classList.add('active');
      const form = new FormData();
      form.append('photo', selFile);
      form.append('caption', document.getElementById('captionInput').value.trim());
      form.append('uploaded_by', user?.display_name || '');
      try {
        await new Promise((res, rej) => {
          const xhr = new XMLHttpRequest();
          xhr.upload.onprogress = (e) => { if (e.lengthComputable) document.getElementById('progressBar').style.width = Math.round(e.loaded / e.total * 100) + '%'; };
          xhr.onload = () => { try { const d = JSON.parse(xhr.responseText); d.success ? res(d) : rej(new Error(d.error || 'アップロード失敗')); } catch { rej(new Error('レスポンス解析失敗')); } };
          xhr.onerror = () => rej(new Error('通信エラー'));
          xhr.open('POST', API); xhr.withCredentials = true; xhr.send(form);
        });
        closeUpload(); showToast('写真をアップロードしました！', 'success'); await loadPhotos();
      } catch (e) { showToast(e.message, 'error'); }
      finally { btn.disabled = false; btn.textContent = '写真をアップロード'; document.getElementById('progress').classList.remove('active'); document.getElementById('progressBar').style.width = '0%'; }
    }

    async function delPhoto(e, id) {
      e.stopPropagation();
      if (!confirm('この写真を削除しますか？')) return;
      try {
        const r = await fetch(API, { method: 'DELETE', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
        const d = await r.json();
        if (d.success) { showToast('削除しました', 'success'); await loadPhotos(); }
        else showToast(d.error || '削除に失敗しました', 'error');
      } catch { showToast('通信エラーが発生しました', 'error'); }
    }

    function openLightbox(i) { lbIndex = i; updateLb(); document.getElementById('lightbox').classList.add('active'); document.addEventListener('keydown', onKey); }
    function updateLb() { const p = photos[lbIndex]; document.getElementById('lbImg').src = imgSrc(p); document.getElementById('lbCaption').textContent = p.caption || ''; document.getElementById('lbMeta').textContent = (p.uploaded_by || '匿名') + ' · ' + fmtDate(p.created_at); document.getElementById('lbCounter').textContent = (lbIndex + 1) + ' / ' + photos.length; }
    function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); document.removeEventListener('keydown', onKey); }
    function lbBgClick(e) { if (e.target === document.getElementById('lightbox')) closeLightbox(); }
    function lbNav(e, dir) { e.stopPropagation(); lbIndex = (lbIndex + dir + photos.length) % photos.length; updateLb(); }
    function onKey(e) { if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + photos.length) % photos.length; updateLb(); } if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % photos.length; updateLb(); } if (e.key === 'Escape') closeLightbox(); }

    function fmtDate(str) { if (!str) return ''; const d = new Date(str.replace(' ', 'T')); return (d.getMonth() + 1) + '/' + d.getDate(); }
    function esc(s) { return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    let toastTimer = null;
    function showToast(msg, type) { const t = document.getElementById('toast'); clearTimeout(toastTimer); t.textContent = msg; t.className = 'toast show ' + (type || ''); toastTimer = setTimeout(() => t.classList.remove('show'), 3000); }
  </script>
